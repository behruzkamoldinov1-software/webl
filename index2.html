<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для любимого человека</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1a001a, #000);
      color: #fff;
      overflow: hidden;
      font-family: 'Arial', Helvetica, sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,38,70,0.08) 0%, transparent 70%);
      animation: glow 8s ease-in-out infinite;
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 10;
      padding: 20px;
    }

    .title {
      font-size: clamp(3.8rem, 14vw, 9.5rem);
      color: #ff2646;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      line-height: 0.85;
      text-shadow: 0 0 40px rgba(255, 38, 70, 0.6);
    }

    .subtitle {
      margin-top: 20px;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: #ff9eb3;
      opacity: 0.9;
    }

    .button {
      margin-top: 40px;
      width: 160px;
      height: 160px;
      border: none;
      background: linear-gradient(145deg, #ff2646, #c6002b);
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 38, 70, 0.6);
      animation: pulseHeart 1.8s ease-in-out infinite;
      transition: all 0.3s ease;
    }

    .button:hover, .button:active {
      transform: scale(1.08);
      box-shadow: 0 0 50px rgba(255, 38, 70, 0.8);
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .heart {
      position: absolute;
      bottom: -60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff4a6d, #ff1a47);
      color: #fff;
      font-weight: bold;
      text-align: center;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 25px rgba(255, 38, 70, 0.7);
      animation: floatUp linear forwards;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .heart span {
      position: relative;
      z-index: 2;
      padding: 10px;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5) rotate(-12deg);
      }
      15% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translateY(-480px) scale(0.85) rotate(18deg);
      }
    }

    /* Адаптация под мобильные */
    @media (max-width: 768px) {
      .heart {
        width: 110px;
        height: 95px;
      }
      .button {
        width: 140px;
        height: 140px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">I love you</h1>
    <p class="subtitle">Нажми❤️</p>
    <button class="button" id="showWords">Жмякай</button>
  </div>

  <script>
    const words = [
      'Люблю тебя',
      'Ты моё всё',
      'Навсегда твоя',
      'Моё счастье',
      'Ты лучше всех',
      'Сердце бьётся для тебя',
      'Самая красивая',
      'Моя нежность',
      'Обнимаю крепко',
      'Ты мой мир'
    ];

    const button = document.getElementById('showWords');

    function createHeart(text, index) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      
      // Постепенное увеличение размера
      const baseSize = 85 + (index * 9); // от ~85px до ~175px
      const size = Math.min(baseSize, 195); // максимальный размер
      
      const leftPos = 15 + Math.random() * 70;
      const duration = 4.2 + Math.random() * 3;
      
      heart.style.left = `${leftPos}%`;
      heart.style.width = `${size}px`;
      heart.style.height = `${size * 0.88}px`;
      heart.style.fontSize = `${14 + index * 1.1}px`; // увеличиваем шрифт
      heart.style.animationDuration = `${duration}s`;
      
      // Лёгкое смещение по горизонтали для естественности
      heart.style.animationName = Math.random() > 0.5 ? 'floatUp' : 'floatUp';
      
      heart.innerHTML = `<span>${text}</span>`;
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), duration * 1000 + 800);
    }

    button.addEventListener('click', () => {
      button.style.transform = 'scale(0.92)';
      setTimeout(() => button.style.transform = '', 180);

      words.forEach((word, index) => {
        setTimeout(() => createHeart(word, index), index * 130);
      });
    });
  </script>
</body>
</html>
