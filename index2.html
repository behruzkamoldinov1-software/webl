<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Для любимого человека</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1a001a, #000);
      color: #fff;
      overflow: hidden;
      font-family: 'Arial', Helvetica, sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,38,70,0.08) 0%, transparent 70%);
      animation: glow 8s ease-in-out infinite;
      pointer-events: none;
    }

    /* ===== КНОПКА НАЗАД В МЕНЮ ===== */
    .back-btn {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.2s;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover, .back-btn:active { background: rgba(255,38,70,0.25); border-color: rgba(255,38,70,0.5); color: #fff; }

    .container {
      text-align: center;
      z-index: 10;
      padding: 20px;
      width: 100%;
    }

    .title {
      font-size: clamp(2.8rem, 12vw, 7rem);
      color: #ff2646;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      line-height: 0.9;
      text-shadow: 0 0 30px rgba(255, 38, 70, 0.6);
    }

    .subtitle {
      margin-top: 15px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: #ff9eb3;
      opacity: 0.9;
    }

    .button {
      margin-top: 35px;
      width: clamp(130px, 35vw, 160px);
      height: clamp(130px, 35vw, 160px);
      border: none;
      background: linear-gradient(145deg, #ff2646, #c6002b);
      color: #fff;
      cursor: pointer;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 38, 70, 0.6);
      animation: pulseHeart 1.8s ease-in-out infinite;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .button:hover, .button:active {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255, 38, 70, 0.8);
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .heart {
      position: absolute;
      bottom: -100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff4a6d, #ff1a47);
      color: #fff;
      font-weight: bold;
      text-align: center;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 20px rgba(255, 38, 70, 0.6);
      animation: floatUp linear forwards;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }

    .heart span {
      position: relative;
      z-index: 2;
      padding: 6px;
      line-height: 1.2;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.4) rotate(-10deg);
      }
      10% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translateY(-110vh) scale(0.8) rotate(15deg);
      }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">← Меню</a>

  <div class="container">
    <h1 class="title">I love you</h1>
    <p class="subtitle">Нажми❤️</p>
    <button class="button" id="showWords">Жмякай</button>
  </div>

  <script>
    const words = [
      'Люблю тебя', 'Ты моё всё', 'Навсегда твоя', 'Моё счастье',
      'Ты лучше всех', 'Сердце для тебя', 'Самая красивая',
      'Моя нежность', 'Обнимаю крепко', 'Ты мой мир'
    ];

    const button = document.getElementById('showWords');

    function createHeart(text, index) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      
      // Адаптивные размеры сердечек для мобильных устройств
      const isMobile = window.innerWidth < 600;
      const startSize = isMobile ? 65 : 85;
      const step = isMobile ? 6 : 9;
      
      const baseSize = startSize + (index * step); 
      const size = Math.min(baseSize, isMobile ? 130 : 195); 
      
      const leftPos = 10 + Math.random() * 75;
      const duration = 3.5 + Math.random() * 2.5;
      
      heart.style.left = `${leftPos}%`;
      heart.style.width = `${size}px`;
      heart.style.height = `${size * 0.88}px`;
      heart.style.fontSize = `${isMobile ? 11 : 14 + index * 1.1}px`; 
      heart.style.animationDuration = `${duration}s`;
      
      heart.innerHTML = `<span>${text}</span>`;
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), duration * 1000 + 500);
    }

    button.addEventListener('click', () => {
      button.style.transform = 'scale(0.92)';
      setTimeout(() => button.style.transform = '', 150);

      words.forEach((word, index) => {
        setTimeout(() => createHeart(word, index), index * 140);
      });
    });
  </script>
</body>
</html>
