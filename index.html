<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Archivo:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0d0010;
    overflow: hidden;
  }

  #app {
    width: 100%;
    height: 100%;
    position: relative;
    background: #0d0010;
    font-family: 'Archivo', sans-serif;
  }

  .page { 
    position: absolute; 
    inset: 0; 
    display: none; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding: 20px;
    overflow: hidden;
  }
  .page.active { display: flex; }

  /* ===== MENU ===== */
  #page-menu {
    background: radial-gradient(ellipse at 50% 40%, #2a0030 0%, #0d0010 70%);
    justify-content: center;
  }

  .menu-title {
    font-family: 'Pacifico', serif;
    font-size: clamp(2rem, 8vw, 2.8rem);
    color: #ff30c5;
    text-shadow: 0 0 30px rgba(255,48,197,0.5);
    margin-bottom: 8px;
    text-align: center;
  }

  .menu-sub {
    font-size: clamp(0.8rem, 3.5vw, 0.95rem);
    color: rgba(255,144,220,0.7);
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .menu-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .menu-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: clamp(12px, 4vw, 16px) clamp(16px, 5vw, 20px);
    border-radius: 16px;
    border: 1px solid rgba(255,48,197,0.25);
    background: rgba(255,255,255,0.04);
    color: #fff;
    cursor: pointer;
    font-family: 'Archivo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    text-align: left;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .menu-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 16px;
  }

  .menu-btn.btn-1::before { background: linear-gradient(135deg, rgba(255,48,197,0.15), transparent); }
  .menu-btn.btn-2::before { background: linear-gradient(135deg, rgba(255,38,70,0.15), transparent); }
  .menu-btn.btn-3::before { background: linear-gradient(135deg, rgba(118,60,140,0.2), transparent); }

  .menu-btn:hover::before { opacity: 1; }
  .menu-btn:hover { border-color: rgba(255,48,197,0.55); transform: translateY(-2px); }
  .menu-btn:active { transform: scale(0.97); }

  .btn-icon { font-size: clamp(1.2rem, 5vw, 1.5rem); }
  .btn-text { display: flex; flex-direction: column; min-width: 0; }
  .btn-label { font-size: clamp(0.85rem, 4vw, 0.95rem); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-hint { font-size: clamp(0.68rem, 3vw, 0.75rem); color: rgba(255,180,230,0.6); font-weight: 400; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .menu-footer {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: rgba(255,100,200,0.4);
    font-family: 'Pacifico', serif;
    text-align: center;
  }

  /* ===== BACK BTN ===== */
  .back-btn {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    left: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Archivo', sans-serif;
    transition: all 0.2s;
    z-index: 100;
    backdrop-filter: blur(4px);
    webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover, .back-btn:active { background: rgba(255,48,197,0.25); border-color: rgba(255,48,197,0.5); color: #fff; }

  /* ===== PAGE 1 — HEARTS CANVAS ===== */
  #page-1 { background: #101010; padding: 0; }

  #pinkboard {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .namebox {
    color: #fff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    width: 90%;
  }

  .namebox h1 {
    font-family: 'Pacifico', serif;
    font-size: clamp(1.8rem, 7vw, 2.5rem);
    color: #fff;
    margin-bottom: 8px;
  }

  .namebox .msg {
    font-size: clamp(0.85rem, 4.5vw, 1.1rem);
    color: rgba(255,254,254,0.95);
    opacity: 0;
    line-height: 1.4;
    animation: fadeInMsg 2.5s ease-in-out 1s forwards;
  }

  @keyframes fadeInMsg { to { opacity: 1; } }

  /* ===== PAGE 3 — LOVE ANIMATION ===== */
  #page-3 {
    background: radial-gradient(circle at center, #1a001a, #000);
  }

  .p3-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mo-svg {
    width: 100%;
    max-width: 500px;
    height: auto;
    margin-top: -20px;
  }

  .lttr { fill: #ff2646; }
  .line-svg { fill: none; stroke: #ff2646; stroke-width: 10; stroke-linecap: round; }

  .replay-btn {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    border-radius: 20px;
    border: 1px solid rgba(255,38,70,0.4);
    background: rgba(255,38,70,0.15);
    color: #ff9eb3;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Archivo', sans-serif;
    transition: all 0.2s;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }
  .replay-btn:hover, .replay-btn:active { background: rgba(255,38,70,0.3); color: #fff; }

  .p3-name {
    position: absolute;
    bottom: clamp(70px, 15vh, 90px);
    font-family: 'Pacifico', serif;
    font-size: 0.9rem;
    color: rgba(255,144,210,0.5);
  }
</style>

<script>
function goTo(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'page-1') initCanvas();
  if (id === 'page-3') initLetterAnim();
}

// ===== PAGE 1: PARTICLE HEARTS =====
let canvasInit = false;
let animFrameId = null;

function initCanvas() {
  if (canvasInit) return;
  canvasInit = true;
  const canvas = document.getElementById('pinkboard');
  const ctx = canvas.getContext('2d');
  const settings = { length: 350, duration: 2, velocity: 85, effect: -0.75, size: 24 };

  function Point(x,y){ this.x=x||0; this.y=y||0; }
  Point.prototype.clone=function(){ return new Point(this.x,this.y); };
  Point.prototype.length=function(l){ if(l===undefined) return Math.sqrt(this.x*this.x+this.y*this.y); this.normalize(); this.x*=l; this.y*=l; return this; };
  Point.prototype.normalize=function(){ var l=this.length(); this.x/=l; this.y/=l; return this; };

  function Particle(){ this.position=new Point(); this.velocity=new Point(); this.acceleration=new Point(); this.age=0; }
  Particle.prototype.initialize=function(x,y,dx,dy){ this.position.x=x; this.position.y=y; this.velocity.x=dx; this.velocity.y=dy; this.acceleration.x=dx*settings.effect; this.acceleration.y=dy*settings.effect; this.age=0; };
  Particle.prototype.update=function(dt){ this.position.x+=this.velocity.x*dt; this.position.y+=this.velocity.y*dt; this.velocity.x+=this.acceleration.x*dt; this.velocity.y+=this.acceleration.y*dt; this.age+=dt; };
  Particle.prototype.draw=function(ctx,img){ function ease(t){ return --t*t*t+1; } var sz=img.width*ease(this.age/settings.duration); ctx.globalAlpha=1-this.age/settings.duration; ctx.drawImage(img,this.position.x-sz/2,this.position.y-sz/2,sz,sz); };

  var pool, firstActive=0, firstFree=0;
  var particles = new Array(settings.length);
  for(var i=0;i<particles.length;i++) particles[i]=new Particle();

  function addP(x,y,dx,dy){ particles[firstFree].initialize(x,y,dx,dy); firstFree++; if(firstFree==particles.length) firstFree=0; if(firstActive==firstFree) firstActive++; if(firstActive==particles.length) firstActive=0; }
  function updateP(dt){ if(firstActive<firstFree){ for(var i=firstActive;i<firstFree;i++) particles[i].update(dt); } if(firstFree<firstActive){ for(var i=firstActive;i<particles.length;i++) particles[i].update(dt); for(var i=0;i<firstFree;i++) particles[i].update(dt); } while(particles[firstActive].age>=settings.duration&&firstActive!=firstFree){ firstActive++; if(firstActive==particles.length) firstActive=0; } }
  function drawP(ctx,img){ if(firstActive<firstFree){ for(var i=firstActive;i<firstFree;i++) particles[i].draw(ctx,img); } if(firstFree<firstActive){ for(var i=firstActive;i<particles.length;i++) particles[i].draw(ctx,img); for(var i=0;i<firstFree;i++) particles[i].draw(ctx,img); } }

  function pointOnHeart(t){ 
    // Немного уменьшаем масштаб сердца для мобилок
    const scale = window.innerWidth < 600 ? 110 : 160;
    const scaleY = window.innerWidth < 600 ? 90 : 130;
    return new Point(scale*Math.pow(Math.sin(t),3), scaleY*Math.cos(t)-50*Math.cos(2*t)-20*Math.cos(3*t)-10*Math.cos(4*t)+25); 
  }

  var hcanvas=document.createElement('canvas'), hctx=hcanvas.getContext('2d');
  hcanvas.width=settings.size; hcanvas.height=settings.size;
  function to(t){ var p=pointOnHeart(t); p.x=settings.size/2+(p.x*settings.size)/350; p.y=settings.size/2-(p.y*settings.size)/350; return p; }
  hctx.beginPath(); var t=-Math.PI; var p=to(t); hctx.moveTo(p.x,p.y);
  while(t<Math.PI){ t+=0.01; p=to(t); hctx.lineTo(p.x,p.y); }
  hctx.closePath(); hctx.fillStyle='#ff30c5'; hctx.fill();
  var img=new Image(); img.src=hcanvas.toDataURL();

  var time; var particleRate=settings.length/settings.duration;

  function render(){
    animFrameId=requestAnimationFrame(render);
    var newTime=new Date().getTime()/1000, dt=newTime-(time||newTime); time=newTime;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var amount=particleRate*dt;
    for(var i=0;i<amount;i++){ var pos=pointOnHeart(Math.PI-2*Math.PI*Math.random()); var dir=pos.clone().length(settings.velocity); addP(canvas.width/2+pos.x,canvas.height/2-pos.y,dir.x,-dir.y); }
    updateP(dt); drawP(ctx,img);
  }

  function onResize(){ canvas.width=canvas.clientWidth; canvas.height=canvas.clientHeight; }
  window.addEventListener('resize', onResize);
  setTimeout(function(){ onResize(); render(); }, 10);
}

// ===== PAGE 3: LETTER ANIMATION =====
var p3Tl = null;
var moLoaded = false;

function initLetterAnim(){
  if(moLoaded) return;
  moLoaded = true;
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@mojs/core/build/mo.min.js';
  s.onload=function(){ runMoAnim(); };
  document.head.appendChild(s);
}

function runMoAnim(){
  var ltrs = document.querySelectorAll('#page-3 .lttr');
  var lineL = document.querySelector('#page-3 .line--left');
  var lineR = document.querySelector('#page-3 .line--rght');
  var col='#ff2646';
  var move=900, boom=200, easing='sin.inOut', easingBoom='sin.in', easingOut='sin.out';
  var opts={duration:move,easing,opacity:1};

  class Heart extends mojs.CustomShape {
    getShape(){ return '<path d="M50,88.9C25.5,78.2,0.5,54.4,3.8,31.1S41.3,1.8,50,29.9c8.7-28.2,42.8-22.2,46.2,1.2S74.5,78.2,50,88.9z"/>'; }
    getLength(){ return 200; }
  }
  mojs.addShape('heart2', Heart);

  var el = {
    i:document.querySelector('.lttr--I'), l:document.querySelector('.lttr--L'),
    o:document.querySelector('.lttr--O'), v:document.querySelector('.lttr--V'),
    e:document.querySelector('.lttr--E'), y:document.querySelector('.lttr--Y'),
    o2:document.querySelector('.lttr--O2'), u:document.querySelector('.lttr--U'),
    lineLeft:lineL, lineRight:lineR
  };
  var cont = document.querySelector('#page-3 .p3-wrap');

  const tl = new mojs.Timeline().add([
    new mojs.Tween({ duration:move, onStart:()=>{ [el.i,el.l,el.o,el.v,el.e,el.y,el.o2,el.u].forEach(e=>{ e.style.opacity=1; }); }, onComplete:()=>{ [el.l,el.o,el.v,el.e].forEach(e=>e.style.opacity=0); } }),
    new mojs.Tween({ duration:move*2+boom, onComplete:()=>{ [el.y,el.o2].forEach(e=>e.style.opacity=0); } }),
    new mojs.Tween({ duration:move*3+boom*2-150, onComplete:()=>{ el.i.style.opacity=0; } }),
    new mojs.Tween({ duration:move*3+boom*2, onComplete:()=>{ el.u.style.opacity=0; } }),
    new mojs.Tween({ duration:50, delay:3800, onUpdate:(p)=>{ [el.i,el.l,el.o,el.v,el.e,el.y,el.o2,el.u].forEach(e=>{ e.style.opacity=p; }); }, onComplete:()=>{ [el.i,el.l,el.o,el.v,el.e,el.y,el.o2,el.u].forEach(e=>{ e.style.opacity=1; }); } }),
    new mojs.Html({...opts,el:el.lineLeft,x:{0:52}}).then({duration:boom+move,easing,x:{to:52+54}}).then({duration:boom+move,easing,x:{to:52+54+60}}).then({duration:150,easing,x:{to:52+54+60+10}}).then({duration:300}).then({duration:300,x:{to:0},easing:easingOut}),
    new mojs.Html({...opts,el:el.lineRight,x:{0:-52}}).then({duration:boom+move,easing,x:{to:-52-54}}).then({duration:boom+move,easing,x:{to:-52-54-60}}).then({duration:150,easing,x:{to:-52-54-60-10}}).then({duration:300}).then({duration:300,x:{to:0},easing:easingOut}),
    new mojs.Html({...opts,el:el.i,x:{0:34}}).then({duration:boom,easing:easingBoom,x:{to:53}}).then({duration:move,easing,x:{to:93}}).then({duration:boom,easing:easingBoom,x:{to:123}}).then({duration:move,easing,x:{to:153}}),
    new mojs.Html({...opts,el:el.l,x:{0:15}}),
    new mojs.Html({...opts,el:el.o,x:{0:11}}),
    new mojs.Html({...opts,el:el.v,x:{0:3}}),
    new mojs.Html({...opts,el:el.e,x:{0:-3}}),
    new mojs.Html({...opts,el:el.y,x:{0:-20}}).then({duration:boom,easing:easingBoom,x:{to:-53}}).then({duration:move,easing,x:{to:-77}}),
    new mojs.Html({...opts,el:el.o2,x:{0:-27}}).then({duration:boom,easing:easingBoom,x:{to:-54}}).then({duration:move,easing,x:{to:-84}}),
    new mojs.Html({...opts,el:el.u,x:{0:-32}}).then({duration:boom,easing:easingBoom,x:{to:-53}}).then({duration:move,easing,x:{to:-89}}).then({duration:boom,easing:easingBoom,x:{to:-120}}).then({duration:move,easing,x:{to:-147}}),
    new mojs.Shape({ parent:cont, shape:'heart2', delay:move, fill:col, x:-64, scale:{0:0.9,easing:'sin.out'}, duration:500 }).then({ x:{to:-62,easing}, scale:{to:0.65,easing}, duration:boom+move-500 }).then({ duration:boom-50, x:{to:-62+48}, scale:{to:0.85}, easing:easingBoom }).then({ duration:250, scale:{to:0.45}, easing }).then({ delay:-75, duration:150, x:{to:0}, scale:{to:0.85}, easing:easingBoom }).then({ duration:250, scale:{to:0}, easing:easingOut }),
  ]);

  p3Tl = tl;
  tl.play();
  setInterval(()=>{ tl.replay(); }, 4100);

  document.getElementById('replayBtn').addEventListener('click', ()=>{ tl.replay(); });
}
</script>
